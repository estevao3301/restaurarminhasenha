<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: #fff;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
    }

    .card img {
      width: 100px;
      margin-bottom: 20px;
    }

    h2 {
      margin: 0;
      font-size: 22px;
      font-weight: normal;
    }

    p {
      color: #555;
      font-size: 14px;
      margin: 8px 0 20px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    .buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-primary {
      background-color: #1a73e8;
      color: #fff;
    }

    .btn-secondary {
      background-color: transparent;
      color: #1a73e8;
    }

    .status {
      margin-top: 16px;
      font-size: 14px;
      min-height: 20px;
    }

    .status.success { color: #027a48; }
    .status.error { color: #b42318; }

    footer {
      margin-top: 20px;
      font-size: 12px;
      color: #777;
    }

    footer a {
      margin: 0 5px;
      color: #777;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <main class="card">
    <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Logo">
    <h2>Fale comigo</h2>
    <p>Preencha o formulário abaixo e sua mensagem será enviada para o meu e-mail.</p>

    <form id="contactForm">
      <input type="text" id="name" placeholder="Nome" required>
      <input type="email" id="email" placeholder="E-mail" required>
      <textarea id="message" placeholder="Mensagem" required></textarea>

      <div class="buttons">
        <button type="reset" class="btn btn-secondary">Limpar</button>
        <button type="submit" class="btn btn-primary">Enviar</button>
      </div>

      <div id="status" class="status"></div>
    </form>

    <footer>
      Português (Brasil) · 
      <a href="#">Ajuda</a> 
      <a href="#">Privacidade</a> 
      <a href="#">Termos</a>
    </footer>
  </main>

  <script>
    const form = document.getElementById("contactForm");
    const statusEl = document.getElementById("status");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      statusEl.textContent = "Enviando...";
      statusEl.className = "status";

      const payload = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        message: document.getElementById("message").value.trim()
      };

      try {
        const response = await fetch("https://restaurarminhasenha.onrender.com/send-email", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || "Erro ao enviar.");
        }

        statusEl.textContent = result.message;
        statusEl.className = "status success";
        form.reset();

      } catch (error) {
        statusEl.textContent = error.message;
        statusEl.className = "status error";
      }
    });
  </script>

</body>
</html>
