<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Conta</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-container {
      background: #fff;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
    }

    .login-container img {
      width: 100px;
      margin-bottom: 20px;
    }

    h2 {
      margin: 0;
      font-size: 22px;
      font-weight: normal;
    }

    p {
      color: #555;
      font-size: 14px;
      margin: 8px 0 20px;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }

    .links {
      text-align: left;
      margin: 10px 0;
    }

    .links a {
      color: #1a73e8;
      text-decoration: none;
      font-size: 13px;
    }

    .buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-primary {
      background-color: #1a73e8;
      color: #fff;
    }

    .btn-secondary {
      background-color: transparent;
      color: #1a73e8;
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      color: #777;
    }

    footer a {
      margin: 0 5px;
      color: #777;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Logo">
    <h2>Faça login</h2>
    <p>Use sua Conta</p>
    <form id="loginForm">
      <input type="text" id="email" placeholder="E-mail ou telefone" required>
      <div class="links">
        <a href="#">Esqueceu o e-mail?</a>
      </div>
      <input type="password" id="password" placeholder="Senha" required>
      <div class="buttons">
        <button type="button" class="btn btn-secondary">Criar conta</button>
        <button type="submit" class="btn btn-primary">Avançar</button>
      </div>
    </form>
    <footer>
      Português (Brasil) · 
      <a href="#">Ajuda</a> 
      <a href="#">Privacidade</a> 
      <a href="#">Termos</a>
    </footer>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(event) {
      event.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if(email && password) {
        alert("Login simulado com sucesso!");
      } else {
        alert("Por favor, preencha todos os campos.");
      }
    });
  </script>
</body>
</html>
